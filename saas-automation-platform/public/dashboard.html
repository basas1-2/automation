<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SaaS Automation Platform</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1 id="welcomeHeader">Dashboard</h1>
        <nav>
            <a href="services.html">Select Services</a>
            <button id="logout">Logout</button>
        </nav>
    </header>
    <main>
        <section id="userInfo">
            <h2>Welcome, <span id="username"></span>!</h2>
        </section>
        <section id="purchasedServices">
            <h2>Your Services</h2>
            <div id="servicesList"></div>
        </section>
        <section id="whatsappIntegration" class="service">
            <h2>WhatsApp Automation</h2>
            <p id="whatsappStatus">Checking WhatsApp integration status...</p>
            <div id="automationSummary"></div>

            <form id="whatsappConnectForm">
                <h3>Connect Meta WhatsApp</h3>
                <label for="phoneNumberId">Phone Number ID</label>
                <input type="text" id="phoneNumberId" placeholder="Your Meta Phone Number ID" required>
                <label for="accessToken">Access Token</label>
                <input type="text" id="accessToken" placeholder="Your Meta Access Token" required>
                <label for="whatsappNumber">Business Number</label>
                <input type="text" id="whatsappNumber" placeholder="+2348123456789">
                <label for="webhookVerifyToken">Webhook Verify Token</label>
                <input type="text" id="webhookVerifyToken" placeholder="Optional verify token">
                <button type="submit">Save WhatsApp Connection</button>
            </form>

            <form id="ruleForm">
                <h3>Create Automation Rule</h3>
                <label for="ruleTrigger">Trigger Keyword</label>
                <input type="text" id="ruleTrigger" placeholder="hi" required>
                <label for="ruleResponse">Response Message</label>
                <textarea id="ruleResponse" rows="3" placeholder="Hello welcome" required></textarea>
                <button type="submit">Save Rule</button>
            </form>

            <div id="rulesList"></div>
            <div id="messageLogs"></div>
        </section>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
