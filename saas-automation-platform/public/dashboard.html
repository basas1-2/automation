<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SaaS Automation Platform</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1 id="welcomeHeader">Dashboard</h1>
        <nav>
            <a href="services.html">Select Services</a>
            <button id="logout">Logout</button>
        </nav>
    </header>
    <main>
        <section id="userInfo">
            <h2>Welcome, <span id="username"></span>!</h2>
        </section>
        <section id="purchasedServices">
            <h2>Your Services</h2>
            <div id="servicesList"></div>
        </section>
        <section id="whatsappIntegration" class="service">
            <h2>WhatsApp Automation</h2>
            <p id="whatsappStatus">Checking WhatsApp integration status...</p>
            <form id="whatsappForm">
                <label for="whatsappNumber">Recipient number:</label>
                <input type="text" id="whatsappNumber" placeholder="2348123456789" required>
                <label for="whatsappMessage">Message:</label>
                <textarea id="whatsappMessage" rows="3" placeholder="Hello from your automation platform" required></textarea>
                <button type="submit">Send Test Message</button>
            </form>
            <p id="whatsappResult"></p>
        </section>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
